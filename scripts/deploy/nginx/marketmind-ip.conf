# MarketMind Nginx 配置 —— 无域名版（学校内网实训环境）
# 部署前需将 __BACKEND_IP__ 替换为 02 机器的内网 IP
#
# 使用方法：
#   sudo cp marketmind-ip.conf /etc/nginx/sites-available/marketmind
#   sudo sed -i 's/__BACKEND_IP__/192.168.1.20/g' /etc/nginx/sites-available/marketmind
#   sudo ln -sf /etc/nginx/sites-available/marketmind /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

upstream marketmind_backend {
    server __BACKEND_IP__:8000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 根路径：前端 Vue SPA
    location / {
        root /opt/marketmind/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态文件缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # API 反向代理 → 02 机器后端
    location /api/ {
        proxy_pass http://marketmind_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # SSE（Server-Sent Events）长连接支持
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Cache-Control no-cache;
    }

    # outputs 静态文件反向代理 → 02 机器后端
    location /outputs/ {
        proxy_pass http://marketmind_backend/outputs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }

    # 健康检查
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
