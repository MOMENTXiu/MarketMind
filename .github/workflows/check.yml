name: repo-check

on:
  push:
  pull_request:

jobs:
  backend-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketmind_test
          POSTGRES_USER: marketmind
          POSTGRES_PASSWORD: marketmind_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketmind -d marketmind_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: marketmind
          MINIO_ROOT_PASSWORD: marketmind_dev_password
        ports:
          - 9000:9000
    env:
      DATABASE_URL: postgresql+psycopg://marketmind:marketmind_dev_password@localhost:5432/marketmind_test
      TEST_DATABASE_URL: postgresql+psycopg://marketmind:marketmind_dev_password@localhost:5432/marketmind_test
      OBJECT_STORAGE_BACKEND: minio
      OBJECT_STORAGE_ENDPOINT: http://localhost:9000
      OBJECT_STORAGE_ACCESS_KEY: marketmind
      OBJECT_STORAGE_SECRET_KEY: marketmind_dev_password
      OBJECT_STORAGE_BUCKET: marketmind-dev
      OBJECT_STORAGE_SECURE: false
      OBJECT_STORAGE_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - name: Install backend dependencies
        run: uv sync
      - name: Lint backend
        run: make backend-lint
      - name: Check backend formatting
        run: make backend-format-check
      - name: Verify Alembic migrations
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
      - name: Wait for MinIO & init bucket
        run: |
          echo "Waiting for MinIO to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          uv run python -c "
          from minio import Minio
          client = Minio('localhost:9000', access_key='marketmind', secret_key='marketmind_dev_password', secure=False)
          if not client.bucket_exists('marketmind-dev'):
              client.make_bucket('marketmind-dev')
              print('Bucket marketmind-dev created')
          else:
              print('Bucket marketmind-dev already exists')
          "
      - name: Test backend
        run: make backend-test

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
