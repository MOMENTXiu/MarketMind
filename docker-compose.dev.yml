services:
  postgres:
    image: postgres:16-alpine
    container_name: marketmind-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketmind
      POSTGRES_USER: marketmind
      POSTGRES_PASSWORD: marketmind_dev_password
    ports:
      - "5432:5432"
    volumes:
      - marketmind_postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketmind -d marketmind"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: marketmind-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - marketmind_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: marketmind-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - marketmind_minio_data:/data
    environment:
      MINIO_ROOT_USER: marketmind
      MINIO_ROOT_PASSWORD: marketmind_dev_password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: marketmind-minio-init-dev
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 marketmind marketmind_dev_password &&
        mc mb local/marketmind-dev --ignore-existing || true
      "

volumes:
  marketmind_postgres_data:
  marketmind_redis_data:
  marketmind_minio_data:
