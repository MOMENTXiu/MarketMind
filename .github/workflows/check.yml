name: repo-check

on:
  push:
  pull_request:

jobs:
  backend-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketmind_test
          POSTGRES_USER: marketmind
          POSTGRES_PASSWORD: marketmind_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketmind -d marketmind_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://marketmind:marketmind_dev_password@localhost:5432/marketmind_test
      TEST_DATABASE_URL: postgresql+psycopg://marketmind:marketmind_dev_password@localhost:5432/marketmind_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - name: Install backend dependencies
        run: uv sync
      - name: Lint backend
        run: make backend-lint
      - name: Check backend formatting
        run: make backend-format-check
      - name: Verify Alembic migrations
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head
      - name: Test backend
        run: make backend-test

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
